version: "3.9"

# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # from secrets, not .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    restart: always

  minio:
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}

  api:
    build:
      target: production
    restart: always
    volumes: []  # no source mounts in production
    command: node dist/main

  web:
    build:
      target: production
    restart: always
    volumes: []
    command: node apps/web/.next/standalone/server.js

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: production
    container_name: saascrm_worker
    restart: always
    command: node dist/worker
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://crm:${POSTGRES_PASSWORD}@postgres:5432/saascrm
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:alpine
    container_name: saascrm_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api
      - web

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email ${SSL_EMAIL} --agree-tos --no-eff-email -d ${DOMAIN}

volumes:
  postgres_data:
  redis_data:
  minio_data:
  certbot_certs:
  certbot_www:
