version: "3.9"

services:
  # ─── PostgreSQL 16 ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: saascrm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: saascrm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d saascrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saascrm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible file storage) ──────────────────────
  minio:
    image: minio/minio:latest
    container_name: saascrm_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── MinIO bucket init ───────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: saascrm_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/saas-crm &&
      mc anonymous set none local/saas-crm &&
      echo 'MinIO bucket created'
      "

  # ─── NestJS API ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: development
    container_name: saascrm_api
    restart: unless-stopped
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - ./prisma:/app/prisma
      - /app/node_modules
      - /app/apps/api/node_modules
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://crm:devpassword@postgres:5432/saascrm
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm --filter api dev

  # ─── Next.js Web ─────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: development
    container_name: saascrm_web
    restart: unless-stopped
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      - api
    command: pnpm --filter web dev

  # ─── BullMQ Dashboard ────────────────────────────────────────
  bull-board:
    image: ghcr.io/felixmosh/bull-board:latest
    container_name: saascrm_bullboard
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  minio_data:
